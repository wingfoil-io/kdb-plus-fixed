name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C instrument-coverage"
  LLVM_PROFILE_FILE: "kdb-plus-fixed-%p-%m.profraw"

jobs:
  ci:
    name: Build, Test, & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchains
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt,clippy
          
      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install clippy-sarif
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: clippy-sarif

      - name: Install sarif-fmt
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: sarif-fmt

      - name: Install grcov
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: grcov

      - name: Build
        run: cargo build --verbose

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --no-capture
        env:
          RUST_LOG: INFO

      - name: Generate coverage report
        run: |
          grcov . \
            --binary-path ./target/debug/ \
            --source-dir . \
            --output-type lcov \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --ignore "target/*" \
            --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

      - name: Run rustfmt
        run: |
          cargo fmt --all -- --check

      - name: Run rust-clippy
        run: |
          set -o pipefail
          set -e

          # First run Clippy with -D warnings to fail on any warnings
          cargo clippy --all-features -- -D warnings

          # Then run it again with JSON output for SARIF reporting
          cargo clippy --all-features --message-format=json \
            | clippy-sarif \
            | tee rust-clippy-results.sarif \
            | sarif-fmt

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
