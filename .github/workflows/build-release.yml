name: Build Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Cargo build profile"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: linux-x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: windows-x86_64
          - target: x86_64-apple-darwin
            runner: macos-13-large
            artifact: macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: macos-arm64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchains
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        if: ${{ inputs.profile == 'release' }}
        run: cargo build --release --all-features --verbose

      - name: Build (debug)
        if: ${{ inputs.profile == 'debug' }}
        run: cargo build --all-features --verbose

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kdb-plus-fixed-${{ matrix.artifact }}
          path: |
            target/${{ inputs.profile == 'release' && 'release' || 'debug' }}/libkdbplus.*
            target/${{ inputs.profile == 'release' && 'release' || 'debug' }}/*.dll
            target/${{ inputs.profile == 'release' && 'release' || 'debug' }}/*.dylib
          if-no-files-found: warn
          retention-days: 30
